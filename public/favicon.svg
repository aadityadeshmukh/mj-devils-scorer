<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
  <!-- First Sword: Hilt bottom-left (4, 20), Tip top-right (20, 4) -->
  <!-- Blade -->
  <line x1="6.5" y1="17.5" x2="19.5" y2="4.5" />
  <!-- Guard -->
  <line x1="6" y1="14" x2="10" y2="18" />
  <!-- Handle -->
  <line x1="6.5" y1="17.5" x2="4.5" y2="19.5" />
  
  <!-- Second Sword: Hilt bottom-right (20, 20), Tip top-left (4, 4) -->
  <!-- Blade -->
  <line x1="17.5" y1="17.5" x2="4.5" y2="4.5" />
  <!-- Guard -->
  <line x1="14" y1="18" x2="18" y2="14" />
  <!-- Handle -->
  <line x1="17.5" y1="17.5" x2="19.5" y2="19.5" />
</svg>